name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          BINARY_NAME: codex-auth
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          STAGE_DIR="dist/${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "${STAGE_DIR}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${STAGE_DIR}/${BINARY_NAME}" ./cmd/codex-auth
          cp README.md "${STAGE_DIR}/README.md" 2>/dev/null || true
          cp LICENSE* "${STAGE_DIR}/" 2>/dev/null || true
          tar -C dist -czf "${STAGE_DIR}.tar.gz" "$(basename "${STAGE_DIR}")"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt

